<!DOCTYPE html>
<html lang="uz">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Startup Club Admin</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<h1>📊 Startup Club Admin Panel</h1>
<h3>Foydalanuvchilar bosqichlari</h3>

<table class="admin-table">

<thead>

<tr>
<th>F.I.O</th>
<th>Startup g'oyasi</th>
<th>Boshlang'ich a'zo</th>
<th>G'oya</th>
<th>Loyiha</th>
<th>MVP</th>
<th>Investitsiya</th>
<th>Progress</th>
</tr>

</thead>

<tbody id="adminData">

</tbody>

</table>

</div>

<script>

/* GOOGLE SHEETS CSV LINK */

const sheetURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQc3WU4jgfLzDIlvMCbY8_AOzMPawkD32qpg5gPYAMvINVfqlIGvV44GrlJU6mop2u84CRVY_LeuIcF/pub?output=csv"

fetch(sheetURL)
.then(res => res.text())
.then(data => {

const rows = data.split("\n").slice(1)

rows.forEach(row => {

const cols = row.split(",")

const table = document.getElementById("adminData")

const tr = document.createElement("tr")

tr.innerHTML = `

<td>${cols[0]}</td>
<td>${cols[5]}</td>

<td>✔</td>

<td>
<button class="approve-btn" onclick="approve(this)">Tasdiqlash</button>
</td>

<td>
<button class="approve-btn" onclick="approve(this)">Tasdiqlash</button>
</td>

<td>
<button class="approve-btn" onclick="approve(this)">Tasdiqlash</button>
</td>

<td>
<button class="approve-btn" onclick="approve(this)">Tasdiqlash</button>
</td>

<td>20%</td>

`

table.appendChild(tr)

})

})

/* TASDIQLASH */

function approve(button){

button.parentElement.innerHTML = "✔"

updateProgress(button)

}

/* PROGRESS HISOBLASH */

function updateProgress(button){

const row = button.closest("tr")

const cells = row.querySelectorAll("td")

let done = 0

for(let i=2;i<=6;i++){

if(cells[i].innerText === "✔"){
done++
}

}

const percent = Math.round((done/5)*100)

row.cells[7].innerText = percent + "%"

}

</script>

</body>
</html>
