<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Startup Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

<h1>🚀 Startup Development Bosqichlari</h1>

<!-- 1 BOSQICH -->

<div class="stage">
<label>
<input type="checkbox" id="stage1">
<b>1-bosqich: Boshlang'ich a'zo</b>
</label>
</div>

<!-- 2 BOSQICH -->

<div class="stage">
<label>
<input type="checkbox" id="stage2">
<b>2-bosqich: G'oya bosqichi</b>
</label>

<div class="box">
<p>Startup g'oyangizni yozing:</p>

<textarea id="ideaText"
placeholder="Startup g'oyangizni yozing..."></textarea>

<button onclick="saveIdea()">G'oyani saqlash</button>

</div>
</div>

<!-- 3 BOSQICH -->

<div class="stage">
<label>
<input type="checkbox" id="stage3">
<b>3-bosqich: Loyiha shakli</b>
</label>

<div class="box">
<p>Loyiha taqdimotini yuklang (PDF / PPT)</p>

<input type="file">

</div>
</div>

<!-- 4 BOSQICH -->

<div class="stage">
<label>
<input type="checkbox" id="stage4">
<b>4-bosqich: MVP</b>
</label>

<div class="box">

<p>MVP videosi yoki link</p>

<input type="text" placeholder="Video link">

</div>
</div>

<!-- 5 BOSQICH -->

<div class="stage">
<label>
<input type="checkbox" id="stage5">
<b>5-bosqich: Grant / Investitsiya</b>
</label>

<div class="box">

<p>So'rovnoma natijalari / MVP sotuvlari / video yuklang</p>

<input type="file">

</div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
