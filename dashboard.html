<!DOCTYPE html>
<html>
<head>
<title>Startap Club Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🚀 Startap Club Dashboard</h1>
<h2 id="stageText"></h2>

<div class="stages">

<div class="stage">
<h3>1️⃣ Boshlang'ich a'zo</h3>
<p>Startup g'oyangizni yuboring</p>

<input id="idea" placeholder="Startup g'oyangiz">
<button onclick="submitIdea()">G'oya yuborish</button>
</div>

<div class="stage">
<h3>2️⃣ G'oya tadqiqoti</h3>
<p>Bozor tadqiqoti va so'rovnoma natijalarini yuklash</p>
</div>

<div class="stage">
<h3>3️⃣ Loyiha shakli</h3>
<p>To'liq biznes reja va tahlil</p>
</div>

<div class="stage">
<h3>4️⃣ MVP</h3>
<p>Minimal ishlaydigan mahsulot</p>
</div>

<div class="stage">
<h3>5️⃣ Investitsiya</h3>
<p>Investor va grant uchun loyiha</p>
</div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
